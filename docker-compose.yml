services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=file:/app/data/db.sqlite
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
